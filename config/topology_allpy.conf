# mini2 tree overlay topology.
#
# Format (one directive per line, '#' starts a comment):
#   node <id> host=<h> port=<p> lang=<cpp|python> [root=true]
#   edge <a> <b>
#   partition <id> <csv_path>
#   param <key> <value>
#
# This file is loaded at startup. NOTHING about the topology (ids, ports,
# peers, partitions) is hard-coded in source.
#
# Overlay (from the assignment spec, tree option):
#   AB, BC, BD, BE, EF, ED, EG, AH, AG, AI
#
# Cross-language: nodes G and I run the Python server; the rest run C++.
# All servers speak the same proto, so it doesn't matter who calls whom.
# For a two-host run, start A,B,C,D,E on host1 and F,G,H,I on host2, and
# just edit host= on each node entry.

node A host=127.0.0.1 port=50051 lang=python    root=true
node B host=127.0.0.1 port=50052 lang=python
node C host=127.0.0.1 port=50053 lang=python
node D host=127.0.0.1 port=50054 lang=python
node E host=127.0.0.1 port=50055 lang=python
node F host=127.0.0.1 port=50056 lang=python
node G host=127.0.0.1 port=50057 lang=python
node H host=127.0.0.1 port=50058 lang=python
node I host=127.0.0.1 port=50059 lang=python

edge A B
edge B C
edge B D
edge B E
edge E F
edge E D
edge E G
edge A H
edge A G
edge A I

partition A data/part_A.csv
partition B data/part_B.csv
partition C data/part_C.csv
partition D data/part_D.csv
partition E data/part_E.csv
partition F data/part_F.csv
partition G data/part_G.csv
partition H data/part_H.csv
partition I data/part_I.csv

# Chunking / fairness tuning knobs (all runtime, NOT compiled in)
param initial_chunk_rows 512
param min_chunk_rows     64
param max_chunk_rows     4096
param chunk_buffer_cap   65536
param request_ttl_secs   120
param fetch_block_ms     150
param push_backoff_ms    25
param janitor_interval_ms 500
